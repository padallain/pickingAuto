services:
  - type: worker
    name: picking-auto
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python picking.py
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GOOGLE_SHEET_NAME
        value: ISOLA
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false